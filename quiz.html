<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e0f2fe, #dbeafe);
      padding: 20px;
    }

    .quiz-container {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      padding: 28px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      color: #1e3a8a;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #475569;
      margin-bottom: 22px;
      font-size: 14px;
    }

    .progress {
      margin-bottom: 20px;
      font-size: 14px;
      color: #334155;
      font-weight: 600;
    }

    .question {
      font-size: 22px;
      color: #0f172a;
      margin-bottom: 18px;
      line-height: 1.4;
    }

    .answers {
      display: grid;
      gap: 12px;
      margin-bottom: 22px;
    }

    .answer-btn {
      width: 100%;
      border: 2px solid #cbd5e1;
      background: #f8fafc;
      color: #0f172a;
      padding: 14px 16px;
      border-radius: 12px;
      text-align: left;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s ease;
    }

    .answer-btn:hover:not(:disabled) {
      background: #e0f2fe;
      border-color: #60a5fa;
      transform: translateY(-1px);
    }

    .answer-btn:disabled {
      cursor: not-allowed;
      opacity: 0.95;
    }

    .correct {
      background: #dcfce7 !important;
      border-color: #22c55e !important;
      color: #166534;
    }

    .wrong {
      background: #fee2e2 !important;
      border-color: #ef4444 !important;
      color: #991b1b;
    }

    .controls {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .btn {
      border: none;
      background: #2563eb;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .btn:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .btn.secondary {
      background: #64748b;
    }

    .btn.secondary:hover {
      background: #475569;
    }

    .hidden {
      display: none;
    }

    .result-box {
      text-align: center;
      padding: 16px 0 6px;
    }

    .score {
      font-size: 34px;
      font-weight: 700;
      color: #1e3a8a;
      margin-bottom: 10px;
    }

    .result-text {
      color: #334155;
      font-size: 16px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="quiz-container">
    <h1 class="title">Quiz App</h1>
    <p class="subtitle">Test your knowledge with this simple interactive quiz.</p>

    <div id="quiz-screen">
      <div id="progress" class="progress"></div>
      <h2 id="question" class="question"></h2>
      <div id="answers" class="answers"></div>
      <div class="controls">
        <button id="next-btn" class="btn hidden">Next Question</button>
      </div>
    </div>

    <div id="result-screen" class="result-box hidden">
      <div id="score" class="score"></div>
      <p id="result-text" class="result-text"></p>
      <button id="restart-btn" class="btn secondary">Restart Quiz</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        question: "Which language is used to style web pages?",
        answers: [
          { text: "HTML", correct: false },
          { text: "CSS", correct: true },
          { text: "Python", correct: false },
          { text: "C++", correct: false }
        ]
      },
      {
        question: "Which tag is used for the largest HTML heading?",
        answers: [
          { text: "<heading>", correct: false },
          { text: "<h6>", correct: false },
          { text: "<h1>", correct: true },
          { text: "<head>", correct: false }
        ]
      },
      {
        question: "What does JS stand for?",
        answers: [
          { text: "JavaSource", correct: false },
          { text: "JavaScript", correct: true },
          { text: "JustStyle", correct: false },
          { text: "ScriptJava", correct: false }
        ]
      },
      {
        question: "Which property changes text color in CSS?",
        answers: [
          { text: "font-style", correct: false },
          { text: "background-color", correct: false },
          { text: "text-color", correct: false },
          { text: "color", correct: true }
        ]
      }
    ];

    const questionEl = document.getElementById('question');
    const answersEl = document.getElementById('answers');
    const nextBtn = document.getElementById('next-btn');
    const progressEl = document.getElementById('progress');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const scoreEl = document.getElementById('score');
    const resultTextEl = document.getElementById('result-text');
    const restartBtn = document.getElementById('restart-btn');

    let currentQuestionIndex = 0;
    let score = 0;

    function startQuiz() {
      currentQuestionIndex = 0;
      score = 0;
      quizScreen.classList.remove('hidden');
      resultScreen.classList.add('hidden');
      nextBtn.classList.add('hidden');
      showQuestion();
    }

    function showQuestion() {
      resetState();
      const currentQuestion = questions[currentQuestionIndex];
      progressEl.textContent = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
      questionEl.textContent = currentQuestion.question;

      currentQuestion.answers.forEach(answer => {
        const button = document.createElement('button');
        button.textContent = answer.text;
        button.classList.add('answer-btn');
        if (answer.correct) {
          button.dataset.correct = answer.correct;
        }
        button.addEventListener('click', selectAnswer);
        answersEl.appendChild(button);
      });
    }

    function resetState() {
      nextBtn.classList.add('hidden');
      answersEl.innerHTML = '';
    }

    function selectAnswer(e) {
      const selectedBtn = e.target;
      const isCorrect = selectedBtn.dataset.correct === 'true';

      if (isCorrect) {
        selectedBtn.classList.add('correct');
        score++;
      } else {
        selectedBtn.classList.add('wrong');
      }

      Array.from(answersEl.children).forEach(button => {
        if (button.dataset.correct === 'true') {
          button.classList.add('correct');
        }
        button.disabled = true;
      });

      nextBtn.classList.remove('hidden');
    }

    function showScore() {
      quizScreen.classList.add('hidden');
      resultScreen.classList.remove('hidden');
      scoreEl.textContent = `${score} / ${questions.length}`;
      resultTextEl.textContent = score === questions.length
        ? 'Excellent! You got every question right.'
        : score >= Math.ceil(questions.length / 2)
        ? 'Nice work! You did well.'
        : 'Good try! Restart and have another go.';
    }

    nextBtn.addEventListener('click', () => {
      currentQuestionIndex++;
      if (currentQuestionIndex < questions.length) {
        showQuestion();
      } else {
        showScore();
      }
    });

    restartBtn.addEventListener('click', startQuiz);

    startQuiz();
  </script>
</body>
</html>
